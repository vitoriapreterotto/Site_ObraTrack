<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <title>Obra Track Teste</title>
</head>

<body>
    <header>
        <nav class="navbar section-content">
            <div class="navbar-left">
                <ul class="nav-menu">
                    <li class="nav-item"><a href="#" class="nav-link">Início</a></li>
                    <li class="nav-item"><a href="#about" class="nav-link">Sobre Nós</a></li>
                    <li class="nav-item"><a href="#report" class="nav-link">Relatórios</a></li>
                    <li class="nav-item"><a href="#questions" class="nav-link">Dúvidas</a></li>
                    <li class="nav-item"><a href="#gallery" class="nav-link">Galeria</a></li>
                    <li class="nav-item"><a href="#contact" class="nav-link">Contato</a></li>
                </ul>
            </div>
            
            <a href="#" class="nav-logo">
                <img src="src/images/logo.png" alt="Logo Obra Track" height="50">
            </a>
    
            <div class="navbar-right-placeholder"></div>

            <div class="icon-left">
                <a href="#" class="social-link">
                    <i class="fa-solid fa-user-tie"></i>
                </a>
                <a href="#" class="social-link">
                    <i class="fa-solid fa-image"></i>
                </a>
                <a href="#" class="social-link">
                    <i class="fa-solid fa-envelope"></i>
                </a>

            </div>

        </nav>
    </header>

    <main>
        <div class="slider-container">
            <div class="slider-wrapper">
                <img src="src/images/1.png" alt="Imagem 1">
                <img src="src/images/2.png" alt="Imagem 2">
                <img src="src/images/3.png" alt="Imagem 3">
                <img src="src/images/4.png" alt="Imagem 4">
                </div>
            <div class="slider-controls">
                
                <div class="dots">
                    </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="src/script.js"></script>
</body>

</html>
